spring.application.name=gaming-wallet

# -----------------------------------------------------------------------
# CONCEPT — Spring Profiles:
# A "profile" is a named configuration environment (local, dev, prod, etc.)
# spring.profiles.active tells Spring which profile to load ON TOP of this
# base file. When set to "local", Spring will also load:
#   application-local.properties
# Values in the profile file OVERRIDE values in this base file.
# On Render (production), you do NOT set spring.profiles.active — instead
# you set real environment variables directly, which Spring reads via ${VAR}.
# -----------------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# -----------------------------------------------------------------------
# Database
# CONCEPT — ${VAR:default} syntax:
# ${DB_URL} means "read the DB_URL environment variable".
# ${DB_URL:} means "read DB_URL, use empty string if missing".
# On Render these are set in the dashboard. Locally they come from
# application-local.properties, which overrides these placeholders.
# -----------------------------------------------------------------------
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings (HikariCP is Spring Boot's default pool)
# CONCEPT — Connection Pooling:
# Opening a new DB connection is expensive (~50ms). A pool keeps N connections
# open and ready. Requests borrow one, use it, return it. 5 is safe for the
# Render free tier (which limits concurrent DB connections on Supabase pooler).
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# -----------------------------------------------------------------------
# JPA / Hibernate
# CONCEPT — ddl-auto=validate:
# Hibernate can CREATE, UPDATE, or VALIDATE your schema against the entities.
# We use "validate" because Flyway owns the schema — Hibernate just checks
# that the database matches the entities at startup. If they don't match,
# the app refuses to start, which is a fast-fail safety net.
# NEVER use "create-drop" or "update" in production — it can silently
# drop columns or wipe tables.
# -----------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------
# Flyway
# CONCEPT — Flyway baseline-on-migrate:
# If the database already has tables but NO flyway_schema_history table
# (e.g. you created tables manually before adding Flyway), this tells
# Flyway to "pretend" V1 was already applied and start from V2.
# For a fresh Supabase database, leave this false.
# -----------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# -----------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------
server.port=${PORT:8080}

# -----------------------------------------------------------------------
# Logging (minimal in production — logs cost money and slow things down)
# -----------------------------------------------------------------------
logging.level.com.gamingwallet=INFO
logging.level.org.hibernate.SQL=WARN

# -----------------------------------------------------------------------
# Spotflow Integration
# These placeholders are filled in by environment variables on Render,
# or by application-local.properties locally.
# -----------------------------------------------------------------------
spotflow.base-url=https://api.spotflow.co/api/v1
spotflow.secret-key=${SPOTFLOW_SECRET_KEY:}
spotflow.public-key=${SPOTFLOW_PUBLIC_KEY:}

# -----------------------------------------------------------------------
# Scheduling
# -----------------------------------------------------------------------
spring.task.scheduling.pool.size=2
